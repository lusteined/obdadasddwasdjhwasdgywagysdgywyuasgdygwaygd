<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>loadstring creater</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 100;
    min-height: 100vh;

    background:
      radial-gradient(circle at center, rgba(0,0,0,0.75) 0%, rgba(2,6,23,0.95) 100%),
      url("https://motionbgs.com/i/c/364x205/media/9079/silver-surfer-black-silence.3840x2160.jpg");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    font-family: "Courier New", monospace;
    color: #e2e8f0;

    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:120px;
    padding-bottom:120px;

    padding: 20px;
    box-sizing: border-box;
  }

  .container {
    width: min(90%, 600px);
    background: rgba(15, 23, 42, 0.85);
    border: 2px solid #334155;
    border-radius: 12px;
    padding: 30px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8);
    text-align: center;
  }

  h1 {
    font-size: 18px;
    color: #ef4444;
    margin-bottom: 20px;
  }

  textarea {
    width: 90%;
    height: 200px;
    background: rgba(2,6,23,0.9);
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 12px;
    color: #e2e8f0;
    font-size: 13px;

    resize: none;
    outline: none;

    overflow: auto;
    white-space: pre;
  }

  .switch-container {
    margin-top: 15px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 10px;
    font-size: 13px;
    color: #cbd5f5;
  }

  .switch {
    position: relative;
    width: 40px;
    height: 20px;
  }

  .switch input {
    display: none;
  }

  .slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background-color: #334155;
    border-radius: 20px;
    transition: 0.3s;
  }

  .slider:before {
    content: "";
    position: absolute;
    height: 16px;
    width: 16px;
    left: 2px;
    top: 2px;
    background-color: white;
    border-radius: 50%;
    transition: 0.3s;
  }

  input:checked + .slider {
    background-color: #ef4444;
  }

  input:checked + .slider:before {
    transform: translateX(20px);
  }

  .key-input {
    margin-top: 10px;
    display: none;
  }

  .key-input input {
    width: 90%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #334155;
    background: rgba(2,6,23,0.9);
    color: #e2e8f0;
    outline: none;
    font-size: 13px;
  }

  button {
    margin-top: 15px;
    width: 100%;
    padding: 12px;
    background: #ef4444;
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 14px;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    background: #dc2626;
  }

  .footer {
    margin-top: 11px;
    font-size: 11px;
    color: #94a3b8;
  }

  .date {
    position: fixed;
    bottom: 10px;
    left: 0;
    width: 100%;
    text-align: center;
    font-size: 10px;
    color: #64748b;
    pointer-events: none;
  }
  
  .page{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:110px;
  }
</style>
</head>

<body>

<div class="page">
  <div class="container">

  <h1>loadstring creater</h1>

  <textarea id="scriptBox" placeholder="Paste your script here..."></textarea>

  <!-- SWITCH 1 -->
  <div class="switch-container">
    <label class="switch">
      <input type="checkbox" id="keyToggle" onchange="toggleKeyBox()">
      <span class="slider"></span>
    </label>
    <span>Key (Enable Access)</span>
  </div>

  <!-- KEY INPUT (NOW UNDER SWITCH 1) -->
  <div class="key-input" id="keyBox">
    <input type="text" id="keyInput" maxlength="32" placeholder="Enter your access key...">
  </div>

  <!-- SWITCH 2 -->
  <div class="switch-container">
    <label class="switch">
      <input type="checkbox" id="customIdToggle" onchange="toggleCustomIdBox()">
      <span class="slider"></span>
    </label>
    <span>Custom ID</span>
  </div>

  <!-- CUSTOM ID INPUT (UNDER SWITCH 2) -->
  <div class="key-input" id="customIdBox">
    <input type="text" id="customIdInput" maxlength="13" placeholder="Enter custom ID...">
  </div>

  <button onclick="obfuscate()">
    Obfuscate
  </button>

  <div class="footer">
    Secure script
  </div>
</div>
</div>

<script>

function toggleKeyBox() {
  const toggle = document.getElementById("keyToggle");
  const box = document.getElementById("keyBox");
  box.style.display = toggle.checked ? "block" : "none";
}

function toggleCustomIdBox() {
  const toggle = document.getElementById("customIdToggle");
  const box = document.getElementById("customIdBox");
  box.style.display = toggle.checked ? "block" : "none";
}

async function obfuscate() {
  const script = document.getElementById("scriptBox");
  const key = document.getElementById("keyInput");
  const custom = document.getElementById("customIdInput");

  const button = document.querySelector("button");

  const keyToggle = document.getElementById("keyToggle");
  const customToggle = document.getElementById("customIdToggle");

  console.log("Script:", script.value);
  console.log("Key:", key.value);
  console.log("Custom:", custom.value);

  if (!script.value) {
    alert("Script is empty");
    return;
  }

  if (keyToggle.checked && !key.value) {
    alert("Key is required");
    return;
  }

  if (!keyToggle.checked) {
    key.value = "";
  }

  if (!customToggle.checked) {
    custom.value = "";
  }

  // 🔒 DISABLE EVERYTHING
  script.disabled = true;
  key.disabled = true;
  custom.disabled = true;
  button.disabled = true;
  keyToggle.disabled = true;
  customToggle.disabled = true;

  let txt
  try {
    const res = await fetch("https://luarmined-api.zinniakillua.workers.dev/obfuscate" + "?auth=" + key.value + "&Id=" + custom.value, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        script: script.value
      })
    });

    txt = await res.text();
    if (txt.includes("loadstring")) {
      script.value = txt;
      key.value = "";
      custom.value = "";
      alert("Success!");
    }
    
  } catch (err) {
    alert(err);
  }

  // 🔓 ENABLE EVERYTHING BACK
  script.disabled = false;
  key.disabled = false;
  custom.disabled = false;
  button.disabled = false;
  keyToggle.disabled = false;
  customToggle.disabled = false;

  if (!txt.includes("loadstring")) {
    alert(txt);
    return;
  }
  
  // 🔄 RESET SWITCHES + CLEAR INPUTS + HIDE BOXES
  keyToggle.checked = false;
  customToggle.checked = false;

  keyBox.style.display = "none";
  customIdBox.style.display = "none";

  key.value = "";
  custom.value = "";
}

const keyInput = document.getElementById("keyInput");
keyInput.addEventListener("input", () => {
  keyInput.value = keyInput.value.replace(/[^a-zA-Z0-9]/g, "");
});

const customInput = document.getElementById("customIdInput");
customInput.addEventListener("input", () => {
  customInput.value = customInput.value.replace(/[^a-zA-Z0-9]/g, "");
});

</script>

</body>
</html>
